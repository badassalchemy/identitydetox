<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Identity Detox — The Baddie Society</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0610;--dark:#0D0618;--darkMid:#461D34;
  --lav:#9CBCB9;--pink:#B16AA2;--mag:#733960;
  --txt:#F7EDF1;--txtSec:#E8D4E0;--txtMuted:#C4A0B8;--txtFaded:#8A6080;--txtQuiet:#5A3A50;
  --border:rgba(179,106,162,0.15);--card:rgba(24,11,30,0.9);
  --pink-grad:linear-gradient(135deg,#733960,#461D34);
  --lav-grad:linear-gradient(135deg,#B16AA2,#733960);
  --grad:linear-gradient(160deg,#0D0618 0%,#1A0828 30%,#3A0F30 65%,#5C1640 100%);
  --stars:radial-gradient(1px 1px at 20% 30%,rgba(247,237,241,0.4),transparent),radial-gradient(1px 1px at 60% 15%,rgba(247,237,241,0.3),transparent),radial-gradient(1.5px 1.5px at 80% 60%,rgba(247,237,241,0.35),transparent),radial-gradient(1px 1px at 40% 80%,rgba(247,237,241,0.25),transparent),radial-gradient(1px 1px at 10% 70%,rgba(247,237,241,0.3),transparent),radial-gradient(1.5px 1.5px at 90% 25%,rgba(247,237,241,0.4),transparent);
  --glow:radial-gradient(ellipse at 55% 60%,rgba(200,60,120,0.22),transparent 60%);
  --glow2:radial-gradient(ellipse at 25% 35%,rgba(100,30,90,0.28),transparent 55%);
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--txtSec);min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(207,174,220,0.2)}
input,textarea{color-scheme:dark;font-family:'Montserrat',sans-serif}
button{cursor:pointer;font-family:'Montserrat',sans-serif}

/* HERO */
.hero{position:relative;overflow:hidden;background:var(--dark);text-align:center;padding:52px 24px 40px;background:var(--grad)}
.hero::before{content:'';position:absolute;inset:0;background-image:var(--stars);pointer-events:none}
.hero::after{content:'';position:absolute;inset:0;background:var(--glow);pointer-events:none}
.hero canvas{display:none}
.hero-glow{position:absolute;inset:0;background:var(--glow2);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.eyebrow{font-size:8px;font-weight:700;letter-spacing:1.8px;color:var(--mag);text-transform:uppercase;margin-bottom:12px}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;color:var(--txt);line-height:1.15}
.hero h1 em{color:var(--pink);font-style:italic;font-weight:400}
.hero-sub{font-size:12px;color:var(--txtMuted);margin-top:12px;line-height:1.75;max-width:400px;margin-left:auto;margin-right:auto}
.hero-accent{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--lav);margin-top:16px;letter-spacing:1px}

/* PROGRESS */
.progress-bar{background:var(--dark);padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.prog-label{font-size:8px;font-weight:700;color:var(--txtQuiet);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
.prog-track{flex:1;height:4px;background:rgba(207,174,220,0.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:var(--pink-grad);transition:width .5s}
.prog-pct{font-size:9px;font-weight:700;color:var(--mag);flex-shrink:0}

/* DAY TABS */
.day-tabs{position:sticky;top:0;z-index:100;background:rgba(8,5,15,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex}
.day-tab{flex:1;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:14px 10px 12px;border:none;background:none;color:var(--txtQuiet);border-bottom:2px solid transparent;transition:color .2s;text-align:center}
.day-tab.active{color:var(--mag);border-bottom-color:var(--mag)}
.day-tab-sub{font-size:7px;margin-top:3px;color:var(--txtFaded);letter-spacing:.3px;font-weight:400;text-transform:none}
.day-tab.active .day-tab-sub{color:var(--pink)}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:28px 20px 80px}

/* DAY HEADER */
.day-header{position:relative;overflow:hidden;background:var(--grad);border-radius:14px;border:1px solid var(--border);margin-bottom:24px;padding:30px 26px}
.day-header::before{content:'';position:absolute;inset:0;background-image:var(--stars);pointer-events:none}
.day-header::after{content:'';position:absolute;inset:0;background:var(--glow);pointer-events:none}
.day-header canvas{display:none}
.day-header-inner{position:relative;z-index:1}
.day-eyebrow{font-size:8px;font-weight:700;letter-spacing:1.8px;color:var(--mag);text-transform:uppercase;margin-bottom:10px}
.day-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--txt);line-height:1.2;margin-bottom:14px}
.day-title em{color:var(--pink);font-style:italic}
.day-intro{font-size:14px;color:var(--txtSec);line-height:1.8}

/* VIDEO */
.video-player{margin-bottom:20px;border-radius:14px;border:1px solid var(--border);background:var(--card);overflow:hidden}
.video-header{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border)}
.video-label{font-size:11px;font-weight:700;color:var(--lav)}
.video-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden}
.video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* SECTION LABEL */
.sec-label{display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:4px}
.sec-label span{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--lav)}

/* EXERCISE BLOCK */
.ex-block{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:26px 24px;margin-bottom:14px}
.ex-num{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:var(--mag);margin-bottom:6px}
.ex-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--lav);margin-bottom:14px;line-height:1.3}
.ex-prompt{font-size:14px;color:var(--txtSec);line-height:1.8;margin-bottom:14px}
.ex-prompt strong{color:var(--txt);font-weight:700}
.ex-italic{font-size:14px;color:var(--pink);font-style:italic;line-height:1.75;margin-bottom:14px}
.ex-textarea{width:100%;font-size:14px;color:var(--txt);background:rgba(207,174,220,0.06);border:1px solid var(--border);border-radius:10px;padding:14px 16px;outline:none;resize:vertical;line-height:1.75}
.ex-input{width:100%;font-size:14px;color:var(--txt);background:rgba(207,174,220,0.06);border:1px solid var(--border);border-radius:8px;padding:12px 14px;outline:none}
.ex-divider{height:1px;background:rgba(207,174,220,0.1);margin:22px 0}

/* PATTERN PICKER */
.pattern-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.pattern-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(207,174,220,0.04);cursor:pointer;transition:all .2s;user-select:none}
.pattern-item:hover{background:rgba(207,174,220,0.08)}
.pattern-item.selected{border-color:var(--lav);background:rgba(207,174,220,0.1)}
.pattern-item.costly{border-color:var(--mag);background:rgba(225,77,168,0.08)}
.pattern-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:all .2s}
.pattern-item.selected .pattern-check,.pattern-item.costly .pattern-check{border:none}
.pattern-item.selected .pattern-check{background:var(--lav-grad)}
.pattern-item.costly .pattern-check{background:var(--pink-grad)}
.pattern-text{font-size:14px;color:var(--txtSec);flex:1;line-height:1.5}
.pattern-item.selected .pattern-text,.pattern-item.costly .pattern-text{color:var(--txt)}
.costly-badge{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0;padding:4px 10px;border-radius:50px;border:1px solid var(--mag);color:var(--mag);background:rgba(225,77,168,0.08);transition:all .2s}
.costly-badge:hover{background:rgba(225,77,168,0.2)}

/* EXAMPLES */
.examples-toggle{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--lav);background:rgba(207,174,220,0.1);border:1px solid var(--border);border-radius:50px;padding:7px 16px;margin-bottom:12px}
.examples-list{display:none;flex-direction:column;gap:8px;margin-bottom:14px}
.example-item{background:rgba(207,174,220,0.05);border-radius:10px;border:1px solid var(--border);padding:12px 16px}
.example-title{font-size:12px;font-weight:700;color:var(--lav);margin-bottom:4px}
.example-body{font-size:12px;color:var(--txtMuted);line-height:1.6}

/* BELIEF REFRAME */
.belief-headers{display:grid;grid-template-columns:1fr 28px 1fr;gap:10px;margin-bottom:6px}
.belief-col-label{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.belief-col-label.old{color:var(--mag)}
.belief-col-label.new{color:var(--lav)}
.belief-rows{display:flex;flex-direction:column;gap:10px}
.belief-row{display:grid;grid-template-columns:1fr 28px 1fr;gap:10px;align-items:center}
.belief-arrow{color:var(--mag);font-size:18px;text-align:center}

/* MANTRAS */
.mantra-row{display:flex;align-items:center;gap:12px;background:rgba(207,174,220,0.06);border-radius:10px;border:1px solid var(--border);padding:12px 14px;margin-bottom:8px}
.mantra-bullet{color:var(--lav);font-size:14px;flex-shrink:0}
.mantra-input{flex:1;font-size:14px;color:var(--txt);background:transparent;border:none;outline:none;font-family:'Montserrat',sans-serif}

/* VALUES */
.values-selected{margin-bottom:14px;padding:12px 16px;background:rgba(207,174,220,0.08);border-radius:10px;border:1px solid var(--border);display:none}
.values-selected.show{display:block}
.values-sel-label{font-size:8px;font-weight:700;letter-spacing:1.2px;color:var(--mag);text-transform:uppercase;margin-bottom:8px}
.values-tags{display:flex;flex-wrap:wrap;gap:6px}
.val-tag{font-size:11px;padding:4px 10px;border-radius:50px;cursor:pointer}
.val-tag.top5{background:var(--pink-grad);color:#fff;border:1px solid var(--mag)}
.val-tag.extra{background:rgba(207,174,220,0.15);color:var(--lav);border:1px solid var(--border)}
.values-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.val-chip{font-size:11px;padding:5px 10px;border-radius:50px;cursor:pointer;transition:all .15s;background:rgba(207,174,220,0.05);color:var(--txtMuted);border:1px solid var(--border)}
.val-chip.selected{background:rgba(207,174,220,0.2);color:var(--lav);border-color:var(--lav)}

/* HINT */
.hint{margin-top:14px;padding:14px 16px;background:rgba(225,77,168,0.06);border-radius:10px;border:1px solid rgba(225,77,168,0.15);font-size:13px;color:var(--txtSec);line-height:1.65}
.hint.lav{background:rgba(207,174,220,0.06);border-color:var(--border)}

/* SAVE */
.save-row{display:flex;align-items:center;gap:14px;margin-top:16px}
.save-btn{font-size:12px;font-weight:700;color:#fff;background:var(--pink-grad);border:none;border-radius:50px;padding:11px 28px;box-shadow:0 4px 16px rgba(225,77,168,0.25);transition:all .2s}
.save-btn.saved{background:rgba(207,174,220,0.3);box-shadow:none}

/* DAY NAV */
.day-nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.nav-prev{font-size:12px;font-weight:700;color:var(--lav);background:transparent;border:1.5px solid var(--lav);border-radius:50px;padding:11px 24px}
.nav-next{font-size:12px;font-weight:700;color:#fff;background:var(--pink-grad);border:none;border-radius:50px;padding:11px 24px;box-shadow:0 4px 16px rgba(225,77,168,0.3)}

/* COMPLETE CARD */
.complete-card{margin-top:24px;position:relative;overflow:hidden;background:var(--dark);border-radius:14px;border:1px solid var(--lav);padding:32px 24px;text-align:center;box-shadow:0 0 40px rgba(207,174,220,0.15);display:none}
.complete-card canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.complete-inner{position:relative}
.complete-accent{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--pink);margin-bottom:12px;letter-spacing:1px}
.complete-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--txt);line-height:1.3;margin-bottom:10px}
.complete-title em{color:var(--pink);font-style:italic}
.complete-body{font-size:13px;color:var(--txtSec);line-height:1.75}

/* UPSELL */
.upsell{margin-top:24px;position:relative;overflow:hidden;background:var(--dark);border-radius:16px;border:1px solid rgba(207,174,220,0.25);padding:36px 28px;text-align:center;box-shadow:0 0 40px rgba(207,174,220,0.1)}
.upsell canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.upsell-inner{position:relative}
.upsell-accent{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--pink);margin-bottom:14px;letter-spacing:1px}
.upsell-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--txt);line-height:1.3;margin-bottom:14px}
.upsell-title em{color:var(--pink);font-style:italic}
.upsell-body{font-size:13px;color:var(--txtSec);line-height:1.8;margin-bottom:20px;max-width:480px;margin-left:auto;margin-right:auto}
.upsell-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--lav);text-transform:uppercase}

.footer{background:var(--dark);padding:12px 24px;text-align:center;border-top:1px solid var(--border);font-size:8px;font-weight:700;letter-spacing:1.2px;color:var(--txtQuiet);text-transform:uppercase}
</style>
</head>
<body>

<div class="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-glow"></div>
  <div class="hero-inner">
    <div class="eyebrow">The Baddie Society · Identity Detox</div>
    <h1>Identity Detox<br><em>Rewire Your Mind</em></h1>
    <p class="hero-sub">3 days. See who you've been. Release what's stopping you. Declare who you're becoming.</p>
    <div class="hero-accent">receive. trust. become.</div>
  </div>
</div>

<div class="progress-bar">
  <span class="prog-label">Progress</span>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <span class="prog-pct" id="prog-pct">0/6 · 0%</span>
</div>

<div class="day-tabs" id="day-tabs"></div>
<div class="main" id="main"></div>
<div class="footer">@badass_alchemy · The Baddie Society on Skool</div>

<script>
// ── STATE ────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('id-detox-final')||'{}');
if (!state.saved)     state.saved = {};
if (!state.completed) state.completed = {};
if (!state.values)    state.values = [];
if (!state.patterns)  state.patterns = [];
if (!state.costly)    state.costly = null;
function persist(){ localStorage.setItem('id-detox-final', JSON.stringify(state)); }

let activeDay = 0;
const ALL_IDS = ['d1-patterns','d1-story','d2-beliefs','d2-record','d3-values','d3-declaration','d3-mantras'];

const VALUES = ["Abundance","Acceptance","Accomplishment","Accountability","Achievement","Adaptability","Adventure","Affection","Ambition","Assertiveness","Authenticity","Awareness","Balance","Beauty","Boldness","Bravery","Brilliance","Calmness","Capable","Caring","Certainty","Challenge","Clarity","Commitment","Community","Compassion","Confidence","Consistency","Contribution","Courage","Creativity","Curiosity","Decisiveness","Dedication","Determination","Dignity","Discipline","Diversity","Empathy","Energy","Enthusiasm","Equality","Excellence","Excitement","Exploration","Faith","Family","Fearless","Fidelity","Focus","Forgiveness","Freedom","Friendship","Fun","Generosity","Grace","Gratitude","Growth","Happiness","Harmony","Health","Honesty","Honor","Humility","Imagination","Independence","Individuality","Inner Harmony","Innovation","Integrity","Intelligence","Intuitive","Joy","Justice","Kindness","Knowledge","Leadership","Learning","Love","Loyalty","Mastery","Meaning","Motivation","Openness","Optimism","Organization","Originality","Passion","Patience","Peace","Playfulness","Positivity","Power","Productivity","Prosperity","Purpose","Quality","Respect","Responsibility","Security","Self-reliance","Self-respect","Sensitivity","Serenity","Service","Simplicity","Sincerity","Spirituality","Strength","Success","Support","Sustainability","Thankful","Thoughtful","Tolerance","Tranquility","Transparency","Trustworthy","Uniqueness","Unity","Vision","Vitality","Wealth","Wisdom"];

let PATTERNS = [
  "Abandoning myself to keep the peace",
  "Saying yes when I mean no",
  "Shrinking so others feel comfortable",
  "Seeking outside permission before I act",
  "Second-guessing myself after I speak",
  "Overgiving to feel worthy",
  "Staying quiet to avoid conflict",
  "Playing small so I don't stand out",
  "Letting other people's moods dictate my energy",
  "Downplaying my desires to seem reasonable",
];

// ── STARS ────────────────────────────────────────────────
function stars(canvas, count){
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||canvas.parentElement?.offsetWidth||680;
  canvas.height=canvas.offsetHeight||canvas.parentElement?.offsetHeight||220;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<count;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*W,Math.random()*H,Math.random()*1.1+0.2,0,Math.PI*2);
    ctx.fillStyle=Math.random()>.7?'#CFAEDC':'#fff';
    ctx.globalAlpha=Math.random()*.6+.2;
    ctx.fill();
  }
  ctx.globalAlpha=1;
  const g=ctx.createRadialGradient(W*.7,H*.3,0,W*.7,H*.3,W*.4);
  g.addColorStop(0,'rgba(207,174,220,0.07)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

// ── PROGRESS ────────────────────────────────────────────
function updateProgress(){
  const done=ALL_IDS.filter(id=>state.completed[id]).length;
  const pct=Math.round((done/ALL_IDS.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=done+'/'+ALL_IDS.length+' · '+pct+'%';
}

function markSaved(id){
  state.completed[id]=true; persist();
  const btn=document.getElementById('sbtn-'+id);
  if(btn){btn.textContent='✦ Saved';btn.classList.add('saved');}
  updateProgress();
  checkComplete();
}

function checkComplete(){
  if(activeDay===0){
    const d1=['d1-patterns','d1-story'].every(id=>state.completed[id]);
    if(d1){const c=document.getElementById('d1-complete');if(c){c.style.display='block';stars(document.getElementById('d1-cc'),80);}}
  }
  if(activeDay===1){
    const d2=['d2-beliefs','d2-record'].every(id=>state.completed[id]);
    if(d2){const c=document.getElementById('d2-complete');if(c){c.style.display='block';stars(document.getElementById('d2-cc'),80);}}
  }
  if(activeDay===2){
    const d3=['d3-values','d3-declaration','d3-mantras'].every(id=>state.completed[id]);
    if(d3){const c=document.getElementById('d3-complete');if(c){c.style.display='block';stars(document.getElementById('d3-cc'),120);}}
  }
}

// ── PATTERN PICKER ───────────────────────────────────────
function togglePattern(val){
  const idx=state.patterns.indexOf(val);
  if(idx>-1) state.patterns.splice(idx,1);
  else if(state.patterns.length<5) state.patterns.push(val);
  if(state.patterns.length>0) markSaved('d1-patterns');
  else { state.completed['d1-patterns']=false; persist(); }
  renderPatterns();
}

function setCostly(val,e){
  if(e) e.stopPropagation();
  state.costly=val; persist();
  renderPatterns();
}

function addCustomPattern(){
  const inp=document.getElementById('custom-pat');
  const val=inp?.value?.trim();
  if(!val) return;
  if(!PATTERNS.includes(val)) PATTERNS.push(val);
  if(state.patterns.length<5&&!state.patterns.includes(val)) state.patterns.push(val);
  persist(); inp.value='';
  renderPatterns();
}

function renderPatterns(){
  const wrap=document.getElementById('pattern-picker');
  if(!wrap) return;
  const sel=state.patterns;
  wrap.innerHTML=PATTERNS.map(p=>{
    const isSel=sel.includes(p);
    const isCostly=state.costly===p;
    return `<div class="pattern-item ${isCostly?'costly':isSel?'selected':''}" onclick="togglePattern('${p.replace(/'/g,"\\'")}')">
      <div class="pattern-check">${isCostly?'💸':isSel?'✓':''}</div>
      <span class="pattern-text">${p}</span>
      ${isSel&&!isCostly?`<span class="costly-badge" onclick="setCostly('${p.replace(/'/g,"\\'")}',event)">Mark costliest</span>`:''}
      ${isCostly?`<span class="costly-badge" style="color:var(--pink);border-color:var(--pink)">Costliest ✦</span>`:''}
    </div>`;
  }).join('');
  const hint=document.getElementById('pat-hint');
  if(hint) hint.textContent=sel.length>0?`${sel.length}/5 selected${state.costly?' · costliest marked ✦':' · tap "Mark costliest" on the one that costs you most'}`:'Select up to 5 patterns that feel most true right now.';
}

// ── VALUES ───────────────────────────────────────────────
function toggleValue(val){
  const idx=state.values.indexOf(val);
  if(idx>-1) state.values.splice(idx,1);
  else state.values.push(val);
  persist();
  document.querySelectorAll('.val-chip').forEach(c=>{
    if(c.dataset.val===val) c.classList.toggle('selected',state.values.includes(val));
  });
  updateValuesTags();
}
function updateValuesTags(){
  const sel=state.values;
  const box=document.getElementById('val-box');
  const lbl=document.getElementById('val-lbl');
  const tags=document.getElementById('val-tags');
  if(!box) return;
  if(sel.length>0){
    box.classList.add('show');
    lbl.textContent=`Selected (${sel.length})${sel.length>5?' — top 5 highlighted':''}`;
    tags.innerHTML=sel.map((v,i)=>`<span class="val-tag ${i<5?'top5':'extra'}" onclick="toggleValue('${v}')">${v}</span>`).join('');
  } else { box.classList.remove('show'); }
}
function buildValuesGrid(){
  const grid=document.getElementById('val-grid');
  if(!grid) return;
  grid.innerHTML=VALUES.map(v=>`<span class="val-chip ${state.values.includes(v)?'selected':''}" data-val="${v}" onclick="toggleValue('${v}')">${v}</span>`).join('');
  updateValuesTags();
}

// ── MAIN RENDER ──────────────────────────────────────────
function render(){
  const tabs=document.getElementById('day-tabs');
  tabs.innerHTML=[
    {t:'Day 1',s:'Shedding the Survival Identity'},
    {t:'Day 2',s:'The Belief Detox'},
    {t:'Day 3',s:'The Identity Activation'},
  ].map((d,i)=>`
    <button class="day-tab ${activeDay===i?'active':''}" onclick="switchDay(${i})">
      <div>${d.t}</div><div class="day-tab-sub">${d.s}</div>
    </button>`).join('');

  const main=document.getElementById('main');
  main.innerHTML=activeDay===0?renderDay1():activeDay===1?renderDay2():renderDay3();

  requestAnimationFrame(()=>{
    stars(document.getElementById('hero-canvas'),180);
    stars(document.getElementById(activeDay===0?'d1hc':activeDay===1?'d2hc':'d3hc'),70);
    if(activeDay===0) renderPatterns();
    if(activeDay===2){ buildValuesGrid(); stars(document.getElementById('upsell-canvas'),100); }
    // restore complete cards
    if(activeDay===0&&['d1-patterns','d1-story'].every(id=>state.completed[id])){
      const c=document.getElementById('d1-complete');if(c){c.style.display='block';stars(document.getElementById('d1-cc'),80);}
    }
    if(activeDay===1&&['d2-beliefs','d2-record'].every(id=>state.completed[id])){
      const c=document.getElementById('d2-complete');if(c){c.style.display='block';stars(document.getElementById('d2-cc'),80);}
    }
    if(activeDay===2&&['d3-values','d3-declaration','d3-mantras'].every(id=>state.completed[id])){
      const c=document.getElementById('d3-complete');if(c){c.style.display='block';stars(document.getElementById('d3-cc'),120);}
    }
  });
  updateProgress();
}

function switchDay(i){ activeDay=i; render(); window.scrollTo({top:0,behavior:'smooth'}); }
window.addEventListener('load',()=>{ stars(document.getElementById('hero-canvas'),180); render(); });
